name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --runInBand
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: subscription-payments-manager
          path: dist/subscription-payments-manager

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy step placeholder: connect Vercel, Netlify, Firebase Hosting, or GitHub Pages."
